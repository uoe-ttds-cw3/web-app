name: Deploy Next.js to Cloud Run

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: uoe-ttds-cw3-openfda
  REGION: europe-west2
  SERVICE_NAME: web-app
  RUNTIME_SA: search-runtime@uoe-ttds-cw3-openfda.iam.gserviceaccount.com

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run (from source)
        run: |
          gcloud run deploy $SERVICE_NAME \
            --source . \
            --region $REGION \
            --allow-unauthenticated \
            --service-account $RUNTIME_SA \
            --set-env-vars INDEX_BUCKET=${{ secrets.INDEX_BUCKET }},INDEX_OBJECT=${{ secrets.INDEX_OBJECT }}
